name: Jules Docs Dispatch

on:
  issue_comment:
    types: [created]

jobs:
  docs:
    runs-on: ubuntu-latest
    # Trigger on @jules-docs comments from authorised users only
    if: >
      contains(github.event.comment.body, '@jules-docs') &&
      contains(fromJSON('["OWNER", "MEMBER"]'), github.event.comment.author_association)
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - name: Fetch issue context
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          gh issue view "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --json title,body,labels \
            --jq '{title, body, labels: [.labels[].name]}' > /tmp/issue.json

          ISSUE_TITLE=$(jq -r '.title' /tmp/issue.json)
          ISSUE_BODY=$(jq -r '.body // "No description provided."' /tmp/issue.json)
          ISSUE_LABELS=$(jq -r '.labels | join(", ")' /tmp/issue.json)

          # Use random delimiters to prevent injection via crafted issue content
          DELIM=$(openssl rand -hex 8)

          {
            echo "title<<$DELIM"
            echo "$ISSUE_TITLE"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

          {
            echo "body<<$DELIM"
            echo "$ISSUE_BODY"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

          echo "labels=$ISSUE_LABELS" >> "$GITHUB_OUTPUT"

      - name: Invoke Jules — Docs
        uses: nq-rdl/jules-action@main
        with:
          jules_api_key: ${{ secrets.R_JULES_TOKEN }}
          include_commit_log: true
          require_plan_approval: false
          title: "Docs: ${{ steps.issue.outputs.title }}"
          prompt: |
            You are a Technical Writer working on RDL Claude Code plugin marketplace — an internal platform that distributes domain-bundled plugins (hooks, agents, skills) for Claude Code.

            Language: Australian English (favour, colour, organisation, licence (noun), license (verb)).

            Tone: Corporate technical — direct, professional, no marketing language.
            Write for engineers who will maintain this project. Assume competence.

            Rules:
            - Be succinct. Say it once, say it clearly, move on.
            - No flowery language, no filler, no adverbs like "simply", "easily", "just".
            - No exclamation marks. No emoji. No rhetorical questions.
            - Prefer active voice. Prefer short sentences.
            - Lead with what the reader needs to do, not background.
            - Use consistent heading hierarchy (H2 for sections, H3 for subsections).
            - Code blocks must specify language (```yaml, ```bash, etc.).
            - File paths and commands in backticks.
            - Tables for structured reference data. Prose for procedures.
            - One blank line between sections. No trailing whitespace.

            ## Architecture context
            - plugins/rdl-skills/     — Source of truth: all canonical skill files
            - plugins/rdl-*/          — Bundle plugins (symlink to rdl-skills)
            - plugins/rdl-hooks/      — Safety guardrails and workflow hooks
            - src/rdl_cc/             — Python CLI (pixi + hatchling)
            - .github/workflows/      — CI: validate, bump-version, release
            - .claude-plugin/         — Marketplace root manifest


            ## Coding standards

            - Python: managed via pixi, build backend is hatchling, ruff for linting
            - Skills: SKILL.md with frontmatter (name, description, triggers)
            - Plugins: plugin.json manifest, skills as symlinks to rdl-skills
            - Hooks: hooks.json for auto-activate, separate .json for opt-in
            - Conventional commits, changie for changelog entries


            ## Documentation layout

            - plugins/rdl-skills/skills/  — Canonical skill definitions (SKILL.md)
            - plugins/rdl-*/              — Bundle plugins with plugin.json manifests
            - plugins/rdl-hooks/          — Safety hooks (hooks.json, scripts/)
            - src/rdl_cc/                 — Python CLI source
            - README.md                   — User-facing documentation
            - CONTRIBUTING.md             — Contributor guide
            - CLAUDE.md                   — Agent context file


            ## GitHub Issue #${{ github.event.issue.number }}: ${{ steps.issue.outputs.title }}

            Labels: ${{ steps.issue.outputs.labels }}

            ${{ steps.issue.outputs.body }}

            ## Triggering comment

            ${{ github.event.comment.body }}

            Determine the documentation task type and act accordingly:

            **Draft** — Write new documentation. Read the relevant code to ensure
            accuracy. Cross-reference existing docs to avoid duplication.

            **Review** — Audit existing docs for accuracy against current code. Fix
            stale references, incorrect commands, outdated configuration values.
            Flag sections where code and docs have diverged.

            **Cleanup** — Fix spelling (Australian English), tone (remove informal
            language), structure (consistent headings, proper code blocks), and
            formatting. Remove redundant content. Tighten prose.

            Open a pull request with your changes when complete.

      - name: React to confirm dispatch
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_ID: ${{ github.event.comment.id }}
          REPO: ${{ github.repository }}
        run: |
          gh api "repos/$REPO/issues/comments/$COMMENT_ID/reactions" \
            -X POST -f content='rocket'
