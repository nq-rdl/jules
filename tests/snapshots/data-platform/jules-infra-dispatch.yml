name: Jules Infra Dispatch

on:
  issue_comment:
    types: [created]

jobs:
  infra:
    runs-on: ubuntu-latest
    # Trigger on @jules-infra comments from authorised users
    if: >
      contains(github.event.comment.body, '@jules-infra') &&
      contains(fromJSON('["OWNER", "MEMBER"]'), github.event.comment.author_association)
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - name: Fetch issue context
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          gh issue view "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --json title,body,labels \
            --jq '{title, body, labels: [.labels[].name]}' > /tmp/issue.json

          ISSUE_TITLE=$(jq -r '.title' /tmp/issue.json)
          ISSUE_BODY=$(jq -r '.body // "No description provided."' /tmp/issue.json)
          ISSUE_LABELS=$(jq -r '.labels | join(", ")' /tmp/issue.json)

          # Use random delimiters to prevent injection via crafted issue content
          DELIM=$(openssl rand -hex 8)

          {
            echo "title<<$DELIM"
            echo "$ISSUE_TITLE"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

          {
            echo "body<<$DELIM"
            echo "$ISSUE_BODY"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

          echo "labels=$ISSUE_LABELS" >> "$GITHUB_OUTPUT"

      - name: Invoke Jules — Infra
        uses: nq-rdl/jules-action@main
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          include_commit_log: true
          require_plan_approval: false
          title: "Infra: ${{ steps.issue.outputs.title }}"
          prompt: |
            You are a Platform Engineer working on RDL Data Platform — an Infrastructure as Code monorepo that provisions a data platform from bare metal through to Kubernetes services.

            ## Architecture context
            - ansible/       — Hypervisor layer: RHEL VMs via libvirt, RKE2 cluster bootstrap
            - terraform/     — Thin bootstrap module: Vault auth, ArgoCD registration, smoke tests
            - argocd/        — App-of-apps: all platform services managed by ArgoCD sync waves
            - src/da/        — Python package (hatchling, editable via pixi)


            ## Coding standards

            - Ansible: FQCN always (ansible.builtin.dnf not dnf), lean roles, variable
              namespacing with role prefix, handlers follow restart-then-verify pattern
            - Terraform: single thin bootstrap module, check blocks for smoke tests,
              sensitive values via TF_VAR_* env vars
            - Platform conventions: use QEMU/libvirt for VM-backed infrastructure,
              RKE2 for Kubernetes, and cloud-init for guest bootstrap; only introduce
              NixOS + flakes for MicroVM or container work when the issue explicitly
              calls for it
            - Validation: Jules has no direct access to libvirt or Kubernetes; rely on
              repository-local checks only (`ansible-lint`, `yamllint`, syntax checks,
              `terraform fmt` / `terraform validate`, Helm lint, pre-commit). Add missing
              tooling when needed.
            - Python: managed via pixi, build backend is hatchling


            ## GitHub Issue #${{ github.event.issue.number }}: ${{ steps.issue.outputs.title }}

            Labels: ${{ steps.issue.outputs.labels }}

            ${{ steps.issue.outputs.body }}

            ## Triggering comment

            ${{ github.event.comment.body }}

            Implement the appropriate infrastructure-as-code solution for the issue above.

            Focus on Ansible, Terraform or OpenTofu, ArgoCD, platform automation,
            validation tooling, and adjacent operator documentation as needed.

            Constraints and validation:
            - Jules does not have direct access to libvirt, hypervisors, QEMU hosts,
              running Kubernetes clusters, or ArgoCD.
            - Do not claim live infrastructure verification or end-to-end platform testing.
            - Validate with repository-local checks only: pre-commit hooks,
              `ansible-lint`, `yamllint`, syntax checks, `terraform fmt` /
              `terraform validate`, Helm or Argo lint, and similar static or dry-run checks
              available in the repo.
            - If important validation tooling is missing, add the minimal tooling or
              configuration needed and include it in the pull request.

            Implementation expectations:
            - Prefer minimal, reviewable, idempotent changes.
            - Keep bootstrap concerns in Terraform or OpenTofu, continuous delivery
              concerns in ArgoCD, and host or VM lifecycle concerns in Ansible.
            - Use secure defaults, explicit configuration, and least privilege.
            - Update related docs or examples when the operator workflow changes.

            Open a pull request with your changes when complete.

      - name: React to confirm dispatch
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_ID: ${{ github.event.comment.id }}
          REPO: ${{ github.repository }}
        run: |
          gh api "repos/$REPO/issues/comments/$COMMENT_ID/reactions" \
            -X POST -f content='rocket'
