name: Jules Security Review Dispatch

on:
  issue_comment:
    types: [created]

jobs:
  security:
    runs-on: ubuntu-latest
    # Trigger on @jules-security comments from authorised users
    if: >
      contains(github.event.comment.body, '@jules-security') &&
      contains(fromJSON('["OWNER", "MEMBER"]'), github.event.comment.author_association)
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - name: Fetch issue context
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          gh issue view "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --json title,body,labels \
            --jq '{title, body, labels: [.labels[].name]}' > /tmp/issue.json

          ISSUE_TITLE=$(jq -r '.title' /tmp/issue.json)
          ISSUE_BODY=$(jq -r '.body // "No description provided."' /tmp/issue.json)
          ISSUE_LABELS=$(jq -r '.labels | join(", ")' /tmp/issue.json)

          # Use random delimiters to prevent injection via crafted issue content
          DELIM=$(openssl rand -hex 8)

          {
            echo "title<<$DELIM"
            echo "$ISSUE_TITLE"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

          {
            echo "body<<$DELIM"
            echo "$ISSUE_BODY"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

          echo "labels=$ISSUE_LABELS" >> "$GITHUB_OUTPUT"

      - name: Detect PR branch
        id: branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          # PR comments arrive as issue_comment events — check if it's a PR
          BRANCH=$(gh pr view "$ISSUE_NUMBER" --repo "$REPO" \
            --json headRefName --jq '.headRefName' 2>/dev/null || echo "main")
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Invoke Jules — Security Review
        uses: nq-rdl/jules-action@d8ed19ed75a6c2a35fd4e06e5b2ca7cd68b27046
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          starting_branch: ${{ steps.branch.outputs.name }}
          include_commit_log: true
          require_plan_approval: false
          title: "Security: ${{ steps.issue.outputs.title }}"
          prompt: |
            You are a Security Engineer working on RDL Data Platform — an Infrastructure as Code monorepo that provisions a data platform from bare metal through to Kubernetes services.

            ## Scope of review
            - ansible/       — Hypervisor layer: RHEL VMs via libvirt, RKE2 cluster bootstrap
            - terraform/     — Thin bootstrap module: Vault auth, ArgoCD registration, smoke tests
            - argocd/        — App-of-apps: all platform services managed by ArgoCD sync waves
            - src/da/        — Python package (hatchling, editable via pixi)


            ## Coding standards

            - Ansible: FQCN always (ansible.builtin.dnf not dnf), lean roles, variable
              namespacing with role prefix, handlers follow restart-then-verify pattern
            - Terraform: single thin bootstrap module, check blocks for smoke tests,
              sensitive values via TF_VAR_* env vars
            - Platform conventions: use QEMU/libvirt for VM-backed infrastructure,
              RKE2 for Kubernetes, and cloud-init for guest bootstrap; only introduce
              NixOS + flakes for MicroVM or container work when the issue explicitly
              calls for it
            - Validation: Jules has no direct access to libvirt or Kubernetes; rely on
              repository-local checks only (`ansible-lint`, `yamllint`, syntax checks,
              `terraform fmt` / `terraform validate`, Helm lint, pre-commit). Add missing
              tooling when needed.
            - Python: managed via pixi, build backend is hatchling


            ## Security areas to assess

            1. **Secrets and credentials** — hardcoded secrets, plaintext passwords, unencrypted
               vault strings, overly broad IAM/RBAC permissions, exposed API keys in vars or templates
            2. **IaC misconfigurations** — insecure defaults in Ansible roles (world-readable files,
               weak SSH config, disabled SELinux/firewalld), Terraform resources with public exposure,
               missing encryption at rest or in transit
            3. **Kubernetes security** — privileged containers, missing Pod Security Standards,
               overly permissive NetworkPolicies, ServiceAccount token automounting, insecure Helm values
            4. **Supply chain** — pinned vs floating action/image versions, unverified external sources
               in requirements.yml, container image provenance
            5. **Proxy and network** — corporate proxy handling (proxy_url), TLS certificate validation,
               RKE2 TLS SANs, exposed service endpoints


            ## GitHub Issue #${{ github.event.issue.number }}: ${{ steps.issue.outputs.title }}

            Labels: ${{ steps.issue.outputs.labels }}

            ${{ steps.issue.outputs.body }}

            ## Triggering comment

            ${{ github.event.comment.body }}

            Identify concrete vulnerabilities or misconfigurations related to the issue above,
            assess their severity (Critical / High / Medium / Low), and implement fixes where possible.
            Where a fix requires broader architectural change, document the finding clearly
            with remediation guidance and open the PR with what can be safely automated.

            Follow secure-by-default principles: fail closed, least privilege, no secrets in logs.

      - name: React to confirm dispatch
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_ID: ${{ github.event.comment.id }}
          REPO: ${{ github.repository }}
        run: |
          gh api "repos/$REPO/issues/comments/$COMMENT_ID/reactions" \
            -X POST -f content='rocket'
